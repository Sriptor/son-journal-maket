<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль ученика</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="./Cтраница ученика_files/admin_main.css">
    <style>
        .profile-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px 40px;
            margin-top: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-height: 120px;
            padding: 16px 12px;
            background: transparent;
            border-radius: 45px;
            transition: background .35s, box-shadow .25s, transform .35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(var(--scroll-scale)) translateY(var(--hover-lift)) rotate(var(--item-rotation));
            will-change: transform;
            position: relative;
            overflow: hidden;
        }

        .form-group:hover {
            transform: scale(1.05) translateY(-2px);
            background: #172c2408;
        }

        body.dark-theme .form-group:hover {
            background: #6ed3ac08;
            transform: scale(1.05) translateY(-2px);
        }

        .form-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 58px;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            font-size: 42px;
            color: var(--text-primary);
            transition: color 0.2s, background 0.2s;
        }

        body.dark-theme .form-icon {
            color: #c8f3e7;
        }

        .form-text {
            flex: 1;
            text-align: center;
        }

        .form-title {
            font-size: 1.18em;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 11px;
            margin-top: 0;
            line-height: 1.14;
            letter-spacing: 0.01em;
        }

        .form-desc {
            font-size: 1.07em;
            color: var(--text-secondary);
            line-height: 1.37;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        body.dark-theme .form-desc {
            color: #9be0c3;
        }

        .form-desc input,
        .form-desc select {
            width: 100%;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 1em;
            font-family: 'Montserrat', Arial, sans-serif;
            text-align: center;
        }

        .form-desc input:focus,
        .form-desc select:focus {
            outline: none;
        }

        .form-desc input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        body.dark-theme .form-desc input::placeholder {
            color: #9be0c3;
        }

        .profile-avatar {
            display: block;
            margin: 0 auto 20px auto;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--text-primary);
            transition: transform .25s;
        }

        .profile-avatar:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-save,
        .btn-change-pass,
        .btn-back {
            color: var(--text-primary);
            font-weight: 600;
            padding: 30px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background .35s, box-shadow .25s, transform .35s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Montserrat', Arial, sans-serif;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            background: transparent;
        }

        .btn-save:hover {
            transform: scale(1.05) translateY(-2px);
            background: #172c2408;
        }

        body.dark-theme .btn-save:hover {
            background: #6ed3ac08;
            transform: scale(1.05) translateY(-2px);
        }

        .btn-change-pass:hover {
            transform: translateY(-2px) scale(1.05);
            background: #172c2408;
        }

        body.dark-theme .btn-change-pass:hover {
            background: #6ed3ac08;
            transform: scale(1.05) translateY(-2px);
        }

        .btn-back {
            grid-column: span 2;
        }

        .btn-back:hover {
            transform: scale(1.05) translateY(-2px);
            background: #172c2408;
        }

        body.dark-theme .btn-back:hover {
            background: #6ed3ac08;
        }

        .file-upload {
            position: relative;
            margin: 0 auto;
            max-width: 200px;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--card-hover);
            border-radius: 15px;
            cursor: pointer;
            transition: transform .25s;
            font-size: 0.9em;
        }

        .file-upload-label:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .file-upload-label .form-icon {
            width: 32px;
            height: 32px;
            font-size: 24px;
            margin-right: 8px;
        }

        .file-upload-label span {
            color: var(--text-primary);
        }

        @media (max-width: 900px) {
            .profile-form {
                gap: 16px;
            }

            .form-group {
                padding: 12px;
            }

            .btn-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .btn-back {
                grid-column: span 1;
            }
        }

        /* Loading skeleton */
        body.loading .container > :not(.profile-skeleton) {
            opacity: 0;
        }

        .profile-skeleton {
            display: none;
        }

        body.loading .profile-skeleton {
            display: block;
        }
    </style>
</head>
<body class="loading">
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 30px; font-size: 2.1em;">Профиль ученика</h1>

        <!-- Loading skeleton -->
        <div class="profile-skeleton">
            <div class="skeleton-shimmer" style="width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px auto; opacity: 0.45;"></div>
            <div class="skeleton-shimmer" style="width: 100%; height: 60px; border-radius: 50px; margin-bottom: 20px; opacity: 0.3;"></div>
            <div class="skeleton-shimmer" style="width: 100%; height: 60px; border-radius: 50px; margin-bottom: 20px; opacity: 0.3;"></div>
            <div class="skeleton-shimmer" style="width: 100%; height: 60px; border-radius: 50px; margin-bottom: 20px; opacity: 0.3;"></div>
            <div class="skeleton-shimmer" style="width: 100%; height: 60px; border-radius: 50px; margin-bottom: 20px; opacity: 0.3;"></div>
            <div class="skeleton-shimmer" style="width: 100%; height: 60px; border-radius: 50px; margin-bottom: 20px; opacity: 0.3;"></div>
            <div class="skeleton-shimmer" style="width: 100%; height: 80px; border-radius: 50px; margin-top: 30px; opacity: 0.4;"></div>
        </div>

        <img class="profile-avatar" src="https://sun.el-journal.ru/137_1758552604.gif" alt="Аватар">

        <div class="file-upload">
            <input type="file" name="avatar" accept="image/*" id="avatar-upload">
            <label for="avatar-upload" class="file-upload-label">
                <span class="material-symbols-rounded form-icon">upload</span>
                <span>Аватар (jpg/png/gif)</span>
            </label>
        </div>

        <form id="profile-form" class="profile-form" method="post" enctype="multipart/form-data" autocomplete="off">
            <div class="form-group">
                <span class="material-symbols-rounded form-icon">person</span>
                <div class="form-text">
                    <div class="form-title">Фамилия</div>
                    <div class="form-desc"><input type="text" name="last_name" value="Оскорбин" required placeholder="Введите фамилию"></div>
                </div>
            </div>
            <div class="form-group">
                <span class="material-symbols-rounded form-icon">account_circle</span>
                <div class="form-text">
                    <div class="form-title">Имя</div>
                    <div class="form-desc"><input type="text" name="first_name" value="Сеня" required placeholder="Введите имя"></div>
                </div>
            </div>
            <div class="form-group">
                <span class="material-symbols-rounded form-icon">mail</span>
                <div class="form-text">
                    <div class="form-title">Email</div>
                    <div class="form-desc"><input type="email" name="email" value="marchenko.i.m@mail.ru" required placeholder="Введите email"></div>
                </div>
            </div>
            <div class="form-group">
                <span class="material-symbols-rounded form-icon">calendar_today</span>
                <div class="form-text">
                    <div class="form-title">Дата рождения</div>
                    <div class="form-desc"><input type="date" name="birth_date" value="2012-07-05"></div>
                </div>
            </div>
        </form>

        <div class="btn-grid">
            <button type="submit" form="profile-form" class="btn-save">Сохранить</button>
            <a href="https://sun.el-journal.ru/s_change_password.php" class="btn-change-pass">Изменить пароль</a>
            <a href="https://sun.el-journal.ru/student_main.php" class="btn-back">Вернуться на главную</a>
        </div>
    </div>

    <!-- Кнопка переключения темы -->
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" aria-pressed="false">
        <span class="material-symbols-rounded" aria-hidden="true">dark_mode</span>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Функционал темы
            const themeToggle = document.getElementById('themeToggle');
            const themeToggleIcon = themeToggle.querySelector('.material-symbols-rounded');
            const THEME_KEY = 'sun-student-theme';

            function applyTheme(mode) {
                const isDark = mode === 'dark';
                document.body.classList.toggle('dark-theme', isDark);
                themeToggle.setAttribute('aria-pressed', String(isDark));
                themeToggleIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
            }

            // Восстановление темы
            const savedTheme = localStorage.getItem(THEME_KEY);
            if (savedTheme === 'dark' || savedTheme === 'light') {
                applyTheme(savedTheme);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'dark' : 'light');
            }

            // Переключение темы
            themeToggle.addEventListener('click', (e) => {
                playThemeWave(e.clientX, e.clientY);
                setTimeout(() => {
                    const nextTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
                    applyTheme(nextTheme);
                    localStorage.setItem(THEME_KEY, nextTheme);
                }, 320);
            });

            // Симуляция загрузки
            setTimeout(() => {
                document.body.classList.remove('loading');
            }, 1500);
        });

        // Функция анимации волны
        function playThemeWave(x, y) {
            const wave = document.createElement('div');
            wave.className = 'theme-wave';
            document.body.appendChild(wave);

            const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2;
            wave.style.width = wave.style.height = maxDim + 'px';
            wave.style.left = (x - maxDim / 2) + 'px';
            wave.style.top = (y - maxDim / 2) + 'px';

            requestAnimationFrame(() => {
                wave.style.transform = 'scale(1)';
            });

            setTimeout(() => {
                wave.classList.add('fade-out');
                setTimeout(() => wave.remove(), 700);
            }, 500);
        }
    </script>
</body>
</html>
