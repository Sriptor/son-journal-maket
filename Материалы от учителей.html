<head>

    <title>Материалы от учителей</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <style>
        :root {
            --page-bg: #f8f8f8;
            --container-bg: #ffffff;
            --text-primary: #106153;
            --text-secondary: #165144;
            --card-hover: #e7f2ee;
            --toggle-bg: #0E4A40;
            --toggle-icon: #ffffff;
            --background-icon-color: #0E4A40;
            --border-color: #0E4A40;
            --shadow-color: rgba(14, 74, 64, 0.08);
            --header-bg: #ebf0ed;
            --nav-link-color: #a0a0a0;
        }

        /* Dark Theme */
        body.dark-theme {
            --page-bg: #101619;
            --container-bg: #181f26;
            --text-primary: #0E4A40;
            --text-secondary: #a6cab8;
            --card-hover: rgba(60, 216, 187, 0.08);
            --toggle-bg: #0E4A40;
            --toggle-icon: #cde3c3;
            --background-icon-color: #44bfa3;
            --border-color: #44bfa3;
            --shadow-color: rgba(68, 191, 163, 0.08);
            --header-bg: rgba(60, 216, 187, 0.1);
            --nav-link-color: #c0c0c0;
        }

        /* Base Styles */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--page-bg);
            color: var(--text-primary);
            font-family: 'Montserrat', Arial, sans-serif;
            margin: 0;
            font-family: 'Montserrat', Arial, sans-serif !important;
        }

        /* Navigation */
        .topnav {
            display: flex;
            align-items: center;
            border-radius: 13px;
            padding: 4px 3vw 4px 2vw;
            margin-bottom: 16px;
            position: relative;
            z-index: 100;
        }

        .hamburger {
            display: flex;
            border: 2px solid var(--border-color);
            cursor: pointer;
            justify-content: center;
            align-items: center;
            height: 44px;
            width: 44px;
            margin-right: 12px;
            z-index: 102;
            border-radius: 30px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hamburger:hover {
            transform: translateY(-1px) scale(1.1);
        }

        .hamburger .material-symbols-rounded {
            color: var(--text-primary);
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hamburger.active .material-symbols-rounded {
            transform: rotate(90deg) scale(1.1);
        }

        /* Mobile Menu */
        .topnav-links {
            display: flex;
            flex-direction: column;
            width: 100vw;
            max-width: 100vw;
            position: absolute;
            left: 0;
            top: 54px;
            border-radius: 0 0 20px 20px;
            padding: 20px 0 12px 0;
            z-index: 101;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .topnav-links.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.57);
            backdrop-filter: blur(20px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .topnav-link {
            font-size: 1.3em;
            padding: 14px 24px 14px 24px;
            margin: 0 auto;
            width: 80%;
            max-width: 400px;
            border-radius: 12px;
            border: none;
            border-bottom: 1px solid rgba(14, 74, 64, 0.08);
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transition-delay: calc(var(--item-index, 0) * 0.08s);
            color: var(--nav-link-color);
            font-weight: 600;
            text-decoration: none !important;
        }

        .topnav-links.show .topnav-link {
            opacity: 1;
            transform: translateY(0);
        }

        .topnav-link:hover,
        .topnav-link:focus,
        .topnav-link:active,
        .topnav-link.active {
            color: #fff !important;
            text-decoration: none !important;
            font-size: 1.5em;
        }

        .topnav-link:hover .material-symbols-rounded,
        .topnav-link:focus .material-symbols-rounded,
        .topnav-link:active .material-symbols-rounded,
        .topnav-link.active .material-symbols-rounded {
            color: #fff !important;
            font-size: 1.5em;
        }

        .topnav-link:last-child {
            border-bottom: none;
            margin-bottom: 8px;
        }

        .topnav-link .material-symbols-rounded {
            margin-right: 8px;
            vertical-align: middle;
            color: var(--background-icon-color);
            font-size: 20px;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .topnav-spacer {
            display: none;
            flex: 1;
        }

        /* Profile Section */
        .topnav-profile {
            display: flex;
            align-items: center;
            margin-left: auto;
            margin-right: 14px;
            margin-top: 3px;
        }

        .topnav-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            box-shadow: 0 1px 7px var(--shadow-color);
            object-fit: cover;
            background: var(--container-bg);
            transition: transform 0.6s ease-out, opacity 0.7s ease-out;
        }

        .topnav-profile a:hover .topnav-avatar,
        .topnav-profile a:focus .topnav-avatar {
            box-shadow: 0 2px 12px var(--shadow-color);
            border-color: var(--border-color);
            transform: scale(1.3) translateY(-1px);
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--toggle-bg);
            color: var(--toggle-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.25s, background 0.25s, color 0.25s;
            margin-right: 12px;
        }

        .theme-toggle:hover {
            transform: translateY(-2px) scale(1.06) rotate(16deg);
            background: var(--text-primary);
            color: #fff;
        }

        .theme-toggle:focus-visible {
            outline: 2px solid currentColor;
            outline-offset: 3px;
        }

        /* Theme Wave Effect */
        .theme-wave {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            transform: scale(0);
            opacity: 1;
            z-index: 9999;
            background: var(--container-bg);
            transition: transform 0.6s ease-out, opacity 0.7s ease-out;
            filter: blur(20px);
        }

        .theme-wave.fade-out {
            opacity: 0;
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 32px auto 0;
            padding: 32px 12px 26px 12px;
            background: var(--container-bg);
            border-radius: 22px;
            box-shadow: 0 7px 28px var(--shadow-color);
        }

        /* Header */
        .header {

            margin-bottom: 18px;
        }

        .header-period {

            color: var(--text-primary);
            font-weight: 700;
            font-size: 2.0em;
        }

        /* Filters */
        .filters-row {
            display: flex;
            gap: 17px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .filters-row label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .filters-row select {
            font-size: 1em;
            border-radius: 30px;
            padding: 5px 13px;
            border: 2px solid var(--border-color);
            background: var(--container-bg);
            color: var(--text-primary);
        }

        .filters-row button {

            color: var(--toggle-icon);
            border: none;
            padding: 7px 18px;
            border-radius: 30px;
            font-weight: 600;

            transform: scale(1.1) translateY(-1px);
        }

        .filter-icon {
            margin-right: 8px;
        }

        /* Materials List */
        .mat-list {
            margin-top: 18px;
        }

        .mat-item {

            padding: 15px 13px 13px 13px;
            border-radius: 13px;
            margin-bottom: 17px;
            display: flex;
            flex-direction: column;
            border: 3px solid var(--border-color);
            box-shadow: 0 2px 11px var(--shadow-color);
            transition: box-shadow 0.15s;
        }

        .mat-item:hover {
            box-shadow: 0 4px 22px var(--shadow-color);
        }

        .mat-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .mat-btn {
            background: var(--text-secondary);
            color: var(--toggle-icon);
            padding: 10px;
            border: var(--shadow-color);
            border-radius: 30px;
            font-weight: 700;
            font-size: 1em;
            margin-right: 18px;
            text-decoration: none;
            transition: background 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            transition: transform 0.6s ease-out, opacity 0.7s ease-out;
        }

        .mat-btn:hover {
            background: var(--text-primary);
            transform: scale(1.1) translateY(-1px);
        }

        .mat-btn .material-symbols-rounded {
            font-size: 32px;
        }

        .mat-comment {
            margin-bottom: 8px;
            color: var(--toggle-icon);
            background: var(--toggle-bg);
            border-radius: 10px;
            font-size: 1.15em;
            font-weight: 700;
            padding: 13px 16px 11px 16px;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mat-comment .mat-btn .material-symbols-rounded {
            font-size: 32px;
            color: var(--toggle-icon);
        }

        .mat-author-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mat-author-text {
            flex: 1;
        }

        .mat-author {
            font-size: 1.09em;
            color: var(--text-secondary);
            margin-bottom: 1px;
            margin-top: 2px;
        }

        .mat-date-with-icon {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 1.04em;
            color: var(--text-secondary);
        }

        .mat-date-with-icon .material-symbols-rounded {
            font-size: 16px;
        }

        .mat-subject {
            font-size: 2.0em;
            color: var(--text-secondary);
            margin-bottom: 1px;
            font-weight: 600;
        }

        /* Skeleton Loading */
        body.loading .mat-item {
            pointer-events: none;
            position: relative;
            overflow: hidden;
        }

        body.loading .mat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(14, 74, 64, 0.2),
                transparent
            );
            animation: matShimmer 2s infinite;
            z-index: 10;
        }

        body.loading .mat-item .mat-comment,
        body.loading .mat-item .mat-author,
        body.loading .mat-item .mat-subject,
        body.loading .mat-item .mat-date {
            opacity: 0.4;
        }

        body.dark-theme body.loading .mat-item::before {
            background: linear-gradient(
                90deg,
                transparent,
                rgba(60, 216, 187, 0.3),
                transparent
            );
        }

        @keyframes matShimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Responsive Design */
        @media (max-width: 850px) {
            .container {
                padding: 8px 0;
            }
        }

        @media (max-width: 700px) {
            .container {
                max-width: 99vw;
                padding: 7px 2vw;
            }
            .filters-row {
                flex-direction: column;
                gap: 7px;
            }
            .mat-btn {
                padding: 8px 12px;
                font-size: 0.97em;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 8px 2vw;
            }
            .mat-btn {
                padding: 8px 12px;
                font-size: 0.97em;
            }
            .filters-row {
                flex-direction: column;
                gap: 7px;
            }
        }

        /* Links Reset */
        a,
        a:visited,
        a:active,
        a:hover,
        a:focus {
            text-decoration: none !important;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Elements
            const hamburgerBtn = document.getElementById('hamburger-btn');
            const topnavLinks = document.getElementById('topnav-links');
            const menuOverlay = document.getElementById('menuOverlay');
            const themeToggle = document.getElementById('themeToggle');
            const themeToggleIcon = themeToggle.querySelector('.material-symbols-rounded');
            const THEME_KEY = 'sun-student-theme';

            // Menu animations
            const menuItems = topnavLinks.querySelectorAll('.topnav-link');
            menuItems.forEach((item, index) => {
                item.style.setProperty('--item-index', index);
            });

            // Hamburger menu functionality
            hamburgerBtn.onclick = function() {
                this.classList.toggle('active');
                topnavLinks.classList.toggle('show');
                menuOverlay.classList.toggle('show');

                const icon = this.querySelector('.material-symbols-rounded');
                if (this.classList.contains('active')) {
                    icon.textContent = 'close';
                } else {
                    icon.textContent = 'menu';
                }
            };

            // Close menu handlers
            menuOverlay.addEventListener('click', () => {
                hamburgerBtn.classList.remove('active');
                topnavLinks.classList.remove('show');
                menuOverlay.classList.remove('show');
                hamburgerBtn.querySelector('.material-symbols-rounded').textContent = 'menu';
            });

            menuItems.forEach(item => {
                item.addEventListener('click', () => {
                    hamburgerBtn.classList.remove('active');
                    topnavLinks.classList.remove('show');
                    menuOverlay.classList.remove('show');
                    hamburgerBtn.querySelector('.material-symbols-rounded').textContent = 'menu';
                });
            });

            // Remove skeleton after 2.5 seconds
            setTimeout(() => {
                document.body.classList.remove('loading');
            }, 2500);

            // Theme functions
            function applyTheme(mode) {
                const isDark = mode === 'dark';
                document.body.classList.toggle('dark-theme', isDark);
                themeToggle.setAttribute('aria-pressed', String(isDark));
                themeToggleIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
            }

            const savedTheme = localStorage.getItem(THEME_KEY);
            if (savedTheme === 'dark' || savedTheme === 'light') {
                applyTheme(savedTheme);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'dark' : 'light');
            }

            themeToggle.addEventListener('click', (e) => {
                playThemeWave(e.clientX, e.clientY);
                const nextTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
                setTimeout(() => {
                    applyTheme(nextTheme);
                    localStorage.setItem(THEME_KEY, nextTheme);
                }, 320);
            });
        });

        // Theme wave function
        function playThemeWave(x, y) {
            const wave = document.createElement('div');
            wave.className = 'theme-wave';
            document.body.appendChild(wave);

            const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2;

            wave.style.width = wave.style.height = maxDim + 'px';
            wave.style.left = (x - maxDim / 2) + 'px';
            wave.style.top = (y - maxDim / 2) + 'px';

            requestAnimationFrame(() => {
                wave.style.transform = 'scale(1)';
            });

            setTimeout(() => {
                wave.classList.add('fade-out');
                setTimeout(() => wave.remove(), 700);
            }, 500);
        }
    </script>
