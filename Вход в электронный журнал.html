<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в электронный журнал</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="./Вход в электронный журнал_files/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="login-body loading">
<div class="login-container">
    <div class="logo-section">
        <img src="./Вход в электронный журнал_files/logo.png" alt="Электронный журнал" style="width:100px; height:auto; margin-bottom:20px;">
    </div>
    
    <h1 style="text-align:center; margin-bottom:50px; font-size:2.1em;">Вход в электронный журнал</h1>
    
    <form method="post" class="login-form" autocomplete="off">
        <div class="login-field">
            <input type="email" name="email" placeholder="Email" required="" autofocus="">
        </div>
        <div class="login-field">
            <input type="password" name="password" placeholder="Пароль" required="">
        </div>
        <button type="submit" class="login-btn">
            <span class="material-symbols-rounded" aria-hidden="true">login</span>
            Войти
        </button>
    </form>

    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" aria-pressed="false">
        <span class="material-symbols-rounded" aria-hidden="true">dark_mode</span>
    </button>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const themeToggle = document.getElementById('themeToggle');
    const themeToggleIcon = themeToggle.querySelector('.material-symbols-rounded');
    const THEME_KEY = 'sun-student-theme';

    function applyTheme(mode) {
        const isDark = mode === 'dark';
        document.body.classList.toggle('dark-theme', isDark);
        themeToggle.setAttribute('aria-pressed', String(isDark));
        themeToggleIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
    }

    const savedTheme = localStorage.getItem(THEME_KEY);
    if (savedTheme === 'dark' || savedTheme === 'light') {
        applyTheme(savedTheme);
    } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');
    }

    themeToggle.addEventListener('click', (e) => {
        // 1. Запускаем волну
        playThemeWave(e.clientX, e.clientY);

        // 2. Определяем следующую тему, но пока НЕ применяем
        const nextTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';

        // 3. Делаем задержку, чтобы сначала прошла волна
        setTimeout(() => {
            applyTheme(nextTheme);
            localStorage.setItem(THEME_KEY, nextTheme);
        }, 320); // ~0.3 сек — оптимально
    });

    const container = document.querySelector('.login-container');
    const skeleton = document.createElement('div');
    skeleton.className = 'login-skeleton';
    skeleton.innerHTML = `
        <div class="skeleton-logo skeleton-shimmer"></div>
        <div class="skeleton-title skeleton-shimmer"></div>
        <div class="skeleton-form">
            <div class="skeleton-field skeleton-shimmer"></div>
            <div class="skeleton-field skeleton-shimmer"></div>
            <div class="skeleton-btn skeleton-shimmer"></div>
        </div>
    `;
    container.prepend(skeleton);

    setTimeout(() => {
        document.body.classList.remove('loading');
        document.querySelector('.login-skeleton').remove();
        document.querySelector('.login-container').classList.add('loaded');
    }, 2500);
});

function playThemeWave(x, y) {
    const wave = document.createElement('div');
    wave.className = 'theme-wave';
    document.body.appendChild(wave);

    const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2;

    wave.style.width = wave.style.height = maxDim + 'px';
    wave.style.left = (x - maxDim / 2) + 'px';
    wave.style.top = (y - maxDim / 2) + 'px';

    // Запускаем волну
    requestAnimationFrame(() => {
        wave.style.transform = 'scale(1)';
    });

    // Убираем волну плавно
    setTimeout(() => {
        wave.classList.add('fade-out');
        setTimeout(() => wave.remove(), 700);
    }, 500);
}
</script>


</body>
</html>
