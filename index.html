<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="./Cтраница ученика_files/admin_main.css">
</head>
<body class="loading">
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 70px; font-size: 2.1em;">Добро пожаловать</h1>
        <div class="menu-grid">
            <a class="menu-item" href="./Профиль ученика.html">
                <span class="menu-icon material-symbols-rounded" aria-hidden="true">account_circle</span>
                <div class="menu-text">
                    <div class="menu-title">Профиль ученика</div>
                    <div class="menu-desc">Личные данные и настройки</div>
                </div>
            </a>
            <a class="menu-item" href="./Cтраница ученика.html">
                <span class="menu-icon material-symbols-rounded" aria-hidden="true">dashboard</span>
                <div class="menu-text">
                    <div class="menu-title">Главная страница ученика</div>
                    <div class="menu-desc">Меню личного кабинета</div>
                </div>
            </a>
        </div>
    </div>

    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" aria-pressed="false">
        <span class="material-symbols-rounded" aria-hidden="true">dark_mode</span>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.menu-item');
            const themeToggle = document.getElementById('themeToggle');
            const themeToggleIcon = themeToggle.querySelector('.material-symbols-rounded');
            const THEME_KEY = 'sun-student-theme';

            items.forEach(item => {
                const skeleton = document.createElement('div');
                skeleton.className = 'menu-skeleton';
                skeleton.innerHTML = `
                    <div class="skeleton-icon skeleton-shimmer"></div>
                    <div class="skeleton-text">
                        <div class="skeleton-line skeleton-title-line skeleton-shimmer"></div>
                        <div class="skeleton-line skeleton-desc-line skeleton-shimmer"></div>
                    </div>
                `;
                item.prepend(skeleton);
            });

            setTimeout(() => {
                document.body.classList.remove('loading');
                document.querySelectorAll('.menu-skeleton').forEach(el => el.remove());
            }, 2500);

            function applyTheme(mode) {
                const isDark = mode === 'dark';
                document.body.classList.toggle('dark-theme', isDark);
                themeToggle.setAttribute('aria-pressed', String(isDark));
                themeToggleIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
            }

            const savedTheme = localStorage.getItem(THEME_KEY);
            if (savedTheme === 'dark' || savedTheme === 'light') {
                applyTheme(savedTheme);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark ? 'dark' : 'light');
            }

            themeToggle.addEventListener('click', (e) => {
                playThemeWave(e.clientX, e.clientY);
                const nextTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
                setTimeout(() => {
                    applyTheme(nextTheme);
                    localStorage.setItem(THEME_KEY, nextTheme);
                }, 320);
            });
        });

        function playThemeWave(x, y) {
            const wave = document.createElement('div');
            wave.className = 'theme-wave';
            document.body.appendChild(wave);

            const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2;
            wave.style.width = wave.style.height = maxDim + 'px';
            wave.style.left = (x - maxDim / 2) + 'px';
            wave.style.top = (y - maxDim / 2) + 'px';

            requestAnimationFrame(() => {
                wave.style.transform = 'scale(1)';
            });

            setTimeout(() => {
                wave.classList.add('fade-out');
                setTimeout(() => wave.remove(), 700);
            }, 500);
        }
    </script>
</body>
</html>
